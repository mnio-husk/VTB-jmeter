name: JMeter load kafka vtb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Install JMeter
      run: |
        wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz
        mv apache-jmeter-5.6.3 jmeter
        
    - name: Copy libs + JMX
      run: |
        mkdir -p jmeter/lib/ext
        cp lib/*.jar jmeter/lib/ext/ || echo "No lib folder"
        
    - name: Run JMX
      run: |
        ./jmeter/bin/jmeter -n -t Jmeter-scenario-vtb.jmx
          
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: jmeter-results
        path: |
          results.jtl
          dashboard/**
