name: JMeter load kafka vtb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        
    - name: Install JMeter
      run: |
        wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz
        mv apache-jmeter-5.6.3 jmeter
        
    - name: Copy libs + JMX
      run: |
        mkdir -p jmeter/lib/ext
        # Копируем ВСЕ .jar из lib/ в JMeter
        cp lib/*.jar jmeter/lib/ext/
        
    - name: Run JMX
      run: |
        ./jmeter/bin/jmeter -n -t Jmeter-scenario-vtb.jmx
