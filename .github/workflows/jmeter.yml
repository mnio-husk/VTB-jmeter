name: JMeter load kafka vtb
on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
   
    - name: Cache JMeter
      uses: actions/cache@v4
      id: jmeter-cache
      with:
        path: jmeter
        key: jmeter-5.6.3-${{ hashFiles('Jmeter-scenario-vtb.jmx') }}
        
    - name: Install JMeter
      if: steps.jmeter-cache.outputs.cache-hit != 'true'
      run: |
        wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz
        mv apache-jmeter-5.6.3 jmeter
        
    - name: Copy Kafka libs
      run: |
        mkdir -p jmeter/lib/ext
        wget -q https://repo1.maven.org/maven2/org/apache/kafka/kafka-clients/3.6.0/kafka-clients-3.6.0.jar -O jmeter/lib/ext/kafka-clients.jar
        cp lib/*.jar jmeter/lib/ext/ 2>/dev/null || true
        
    - name: Run JMX
      run: |
        ./jmeter/bin/jmeter -n -t Jmeter-scenario-vtb.jmx 
